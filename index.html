<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>对战选牌 - 超39输</title>
    <style>
        * { user-select: none; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: system-ui, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #1a472a 0%, #0e2a1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 16px;
        }
        .game-container {
            background: rgba(255,248,225,0.95);
            border-radius: 48px;
            max-width: 500px;
            width: 100%;
            padding: 20px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.4);
            text-align: center;
            position: relative;
        }
        h1 { font-size: 1.5rem; margin: 0 0 5px; color: #ffd966; background: #2c1a0e; display: inline-block; padding: 5px 20px; border-radius: 40px; }
        .menu-btn { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.5); border: none; font-size: 1.5rem; padding: 8px 12px; border-radius: 30px; color: white; cursor: pointer; }
        .settings-btn { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.5); border: none; font-size: 1.3rem; padding: 8px 12px; border-radius: 30px; color: white; cursor: pointer; }
        .side-menu { position: fixed; top: 0; left: -85%; width: 80%; max-width: 320px; height: 100%; background: #2d2b26; z-index: 1001; transition: left 0.3s ease; padding: 20px; color: #ffecb3; overflow-y: auto; }
        .side-menu.open { left: 0; }
        .side-menu h3 { color: #ffd966; }
        .record-item { background: #3d3a30; padding: 8px; margin: 8px 0; border-radius: 12px; font-size: 0.75rem; }
        .close-menu { background: #8b691b; border: none; padding: 8px 16px; border-radius: 30px; color: white; width: 100%; margin-top: 15px; cursor: pointer; }
        .settings-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1002; }
        .settings-content { background: #2d2b26; border-radius: 30px; padding: 20px; max-width: 320px; width: 85%; color: #ffecb3; }
        .settings-content h3 { text-align: center; color: #ffd966; margin-top: 0; }
        .settings-row { margin: 15px 0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .settings-row select, .settings-row input { background: #1f2c17; color: #ffecb3; border: 1px solid #ffd966; border-radius: 20px; padding: 6px 12px; }
        .settings-row button { background: #8b691b; color: white; border: none; border-radius: 20px; padding: 6px 16px; cursor: pointer; }
        .close-settings { background: #517a47; border: none; padding: 10px; border-radius: 40px; color: white; width: 100%; margin-top: 15px; cursor: pointer; }
        .turn-indicator { background: #2d2b26; border-radius: 40px; padding: 8px; margin: 50px 0 12px; font-weight: bold; }
        .stats { background: #2d2b26; border-radius: 30px; padding: 12px; margin-bottom: 15px; }
        .total { font-size: 2.2rem; font-weight: 800; background: #f9f3e0; display: inline-block; padding: 5px 20px; border-radius: 50px; color: #c0392b; }
        .remain { color: #f3d382; margin-top: 5px; font-size: 0.85rem; }
        .cards-pool { background: #ecd9b4; border-radius: 30px; padding: 12px; margin: 15px 0; }
        .pool-title { font-weight: bold; margin-bottom: 10px; color: #5a3a1a; }
        .card-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        .card-btn { background: #f5e6c8; border: 2px solid #b97f3a; width: 60px; padding: 8px 0; border-radius: 20px; font-size: 1.3rem; font-weight: bold; cursor: pointer; box-shadow: 0 3px 0 #a1582c; }
        .card-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #a1582c; }
        .card-btn.disabled { opacity: 0.4; pointer-events: none; }
        .card-count { font-size: 0.7rem; color: #8b5a2b; display: block; }
        .last-draw { font-size: 0.85rem; background: #f7e5c2; display: inline-block; padding: 5px 15px; border-radius: 30px; margin-bottom: 10px; }
        .message { background: #1f2c17; margin-top: 15px; padding: 10px; border-radius: 30px; color: #ffecb3; font-size: 0.8rem; }
        .reset-btn { background: #517a47; border: none; font-size: 1rem; padding: 8px 20px; border-radius: 40px; color: white; cursor: pointer; margin-top: 10px; }
        .first-hand-select { margin: 10px 0; display: flex; justify-content: center; gap: 20px; align-items: center; }
        .first-hand-select label { font-weight: bold; color: #5a3a1a; }
        .first-hand-select select { background: #f5e6c8; border: 2px solid #b97f3a; border-radius: 30px; padding: 6px 12px; font-weight: bold; }
        footer { font-size: 0.6rem; margin-top: 12px; opacity: 0.7; }
        .version-info { font-size: 0.6rem; margin-top: 8px; color: #8b7355; }
        @media (max-width: 480px) { .card-btn { width: 50px; font-size: 1.1rem; } }
    </style>
</head>
<body>
<div class="game-container">
    <button class="menu-btn" id="menuBtn">☰</button>
    <button class="settings-btn" id="settingsBtn">⚙️</button>
    <h1>🎴 对战选牌</h1>

    <div class="first-hand-select">
        <label>🎲 先手选择：</label>
        <select id="firstHandSelect">
            <option value="player">👤 玩家先手</option>
            <option value="ai">🤖 AI先手</option>
        </select>
    </div>

    <div class="turn-indicator" id="turnIndicator">👤 玩家回合</div>
    <div class="stats">
        <div class="total">🎯 总分: <span id="totalValue">0</span></div>
        <div class="remain">📦 剩余牌数: <strong id="cardsLeft">32</strong></div>
    </div>
    <div class="cards-pool">
        <div class="pool-title">🎴 剩余牌数量</div>
        <div class="card-buttons" id="cardButtons"></div>
    </div>
    <div class="last-draw" id="lastDrawInfo">✨ 游戏开始 ✨</div>
    <button id="resetBtn" class="reset-btn">🔄 重新开局</button>
    <div class="message" id="msgArea">选择先手后开始游戏</div>
    <div class="version-info" id="versionInfo">版本加载中...</div>
    <footer>牌池:1~8各4张 | 超过39即败</footer>
</div>

<div id="sideMenu" class="side-menu">
    <h3>📋 当前游戏记录</h3>
    <div id="currentRecordList">暂无记录</div>
    <h3>📜 历史战绩</h3>
    <div id="historyRecordList">暂无历史</div>
    <button class="close-menu" id="closeMenuBtn">关闭</button>
</div>

<div id="settingsModal" class="settings-modal">
    <div class="settings-content">
        <h3>⚙️ 游戏设置</h3>
        <div class="settings-row"><span>🎵 背景音乐</span><select id="musicToggleSelect"><option value="on">开启</option><option value="off">关闭</option></select></div>
        <div class="settings-row"><span>🔊 音量</span><input type="range" id="volumeSlider" min="0" max="100" value="25"><span id="volumeValue">25%</span></div>
        <div class="settings-row"><span>⏭️ 切换歌曲</span><button id="nextMusicBtn">下一首</button></div>
        <div class="settings-row"><span>🎮 难度</span>
            <select id="difficultySelect">
                <option value="low">🐣 低难度（AI会自爆）</option>
                <option value="normal">⚖️ 正常难度（AI谨慎）</option>
                <option value="high">🔥 高难度（AI抢大牌）</option>
                <option value="extreme">💀 极高难度（AI抢节点+封小牌）</option>
            </select>
        </div>
        <button class="close-settings" id="closeSettingsBtn">保存并关闭</button>
    </div>
</div>

<script>
    // ==================== 音乐系统 ====================
    const musicList = [
        'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3',
        'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3',
        'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3'
    ];
    let currentMusicIndex = 0;
    let currentAudio = null;
    let musicEnabled = true;
    let musicStarted = false;

    function playCurrentMusic() {
        if (!musicEnabled) return;
        if (currentAudio) { currentAudio.pause(); currentAudio = null; }
        currentAudio = new Audio(musicList[currentMusicIndex]);
        currentAudio.loop = true;
        const vol = document.getElementById('volumeSlider').value / 100;
        currentAudio.volume = vol;
        currentAudio.play().catch(e => console.log('音乐播放失败:', e));
        musicStarted = true;
    }
    function stopMusic() { if (currentAudio) { currentAudio.pause(); currentAudio = null; } musicStarted = false; }
    function setMusicVolume(vol) { if (currentAudio) currentAudio.volume = vol / 100; }
    function nextMusic() { currentMusicIndex = (currentMusicIndex + 1) % musicList.length; playCurrentMusic(); }

    // ==================== AI 难度策略（选牌模式）====================
    let currentDifficulty = 'normal';
    
    function getAIPlayCard(remainingCards, currentTotal, playerTotal, history) {
        if (!remainingCards.length) return null;
        
        // 🐣 低难度：AI随机出牌（经常自爆）
        if (currentDifficulty === 'low') {
            return remainingCards[Math.floor(Math.random() * remainingCards.length)];
        }
        
        // ⚖️ 正常难度：只考虑自己不爆，选最大的安全牌
        if (currentDifficulty === 'normal') {
            let safe = remainingCards.filter(n => currentTotal + n <= 39);
            if (safe.length) return Math.max(...safe);
            return Math.min(...remainingCards);
        }
        
        // 🔥 高难度：优先抢大牌（5-8），逼玩家爆
        if (currentDifficulty === 'high') {
            let big = remainingCards.filter(n => n >= 5 && currentTotal + n <= 39);
            if (big.length) return Math.max(...big);
            let safe = remainingCards.filter(n => currentTotal + n <= 39);
            if (safe.length) return Math.max(...safe);
            return Math.min(...remainingCards);
        }
        
        // 💀 极高难度：抢节点（12/24/36）+ 抢小牌封玩家
        if (currentDifficulty === 'extreme') {
            // 关键节点：12, 24, 36
            const targets = [12, 24, 36];
            for (let target of targets) {
                let need = target - currentTotal;
                if (need >= 1 && need <= 8 && remainingCards.includes(need)) {
                    return need; // 直接抢节点
                }
            }
            // 如果玩家分数 > 30，抢小牌（1,2,3）封玩家
            if (currentTotal > 30) {
                let small = remainingCards.filter(n => n <= 3);
                if (small.length) return Math.min(...small);
            }
            // 否则抢最大的安全牌施压
            let safe = remainingCards.filter(n => currentTotal + n <= 39);
            if (safe.length) return Math.max(...safe);
            return Math.min(...remainingCards);
        }
        return remainingCards[0];
    }

    // ==================== 记录系统 ====================
    let currentGameMoves = [];
    let historyRecords = [];
    
    function loadHistory() {
        const saved = localStorage.getItem('cardGameHistory_v2');
        if (saved) { try { historyRecords = JSON.parse(saved); } catch(e) {} }
        updateHistoryDisplay();
    }
    function saveHistory() { localStorage.setItem('cardGameHistory_v2', JSON.stringify(historyRecords)); updateHistoryDisplay(); }
    function saveCurrentGameToHistory(result, finalScoreVal) {
        if (currentGameMoves.length === 0) return;
        historyRecords.unshift({ date: new Date().toLocaleString(), result, finalScore: finalScoreVal, moves: [...currentGameMoves] });
        if (historyRecords.length > 20) historyRecords.pop();
        saveHistory();
    }
    function updateHistoryDisplay() {
        const historyDiv = document.getElementById('historyRecordList');
        if (!historyDiv) return;
        if (historyRecords.length === 0) { historyDiv.innerHTML = '暂无历史'; return; }
        historyDiv.innerHTML = historyRecords.map(rec => `<div class="record-item"><strong>${rec.result}</strong> | 总分:${rec.finalScore} | ${rec.date}<br>牌序: ${rec.moves.map(m => `${m.by}${m.number}`).join('→')}</div>`).join('');
    }
    function updateCurrentRecordDisplay() {
        const recordDiv = document.getElementById('currentRecordList');
        if (!recordDiv) return;
        if (currentGameMoves.length === 0) { recordDiv.innerHTML = '暂无记录'; return; }
        recordDiv.innerHTML = currentGameMoves.map(m => `<div class="record-item">${m.by} 出了 ${m.number}</div>`).join('');
    }
    function addMove(number, by) { currentGameMoves.push({ number, by, time: new Date().toLocaleTimeString() }); updateCurrentRecordDisplay(); }
    function clearCurrentMoves() { currentGameMoves = []; updateCurrentRecordDisplay(); }

    // ==================== 游戏逻辑 ====================
    let remaining = {1:4, 2:4, 3:4, 4:4, 5:4, 6:4, 7:4, 8:4};
    let currentTotal = 0;
    let gameActive = true;
    let isPlayerTurn = true;
    let aiTimer = null;
    let gameStarted = false;

    const totalSpan = document.getElementById('totalValue');
    const cardsLeftSpan = document.getElementById('cardsLeft');
    const resetBtn = document.getElementById('resetBtn');
    const msgDiv = document.getElementById('msgArea');
    const lastDrawInfo = document.getElementById('lastDrawInfo');
    const turnIndicator = document.getElementById('turnIndicator');
    const cardButtonsDiv = document.getElementById('cardButtons');
    const menuBtn = document.getElementById('menuBtn');
    const settingsBtn = document.getElementById('settingsBtn');
    const sideMenu = document.getElementById('sideMenu');
    const settingsModal = document.getElementById('settingsModal');
    const closeMenuBtn = document.getElementById('closeMenuBtn');
    const closeSettingsBtn = document.getElementById('closeSettingsBtn');
    const musicToggleSelect = document.getElementById('musicToggleSelect');
    const volumeSlider = document.getElementById('volumeSlider');
    const volumeValue = document.getElementById('volumeValue');
    const difficultySelect = document.getElementById('difficultySelect');
    const firstHandSelect = document.getElementById('firstHandSelect');
    const nextMusicBtn = document.getElementById('nextMusicBtn');

    function getTotalRemaining() { let sum = 0; for (let i = 1; i <= 8; i++) sum += remaining[i]; return sum; }
    function updateUI() {
        cardsLeftSpan.innerText = getTotalRemaining();
        totalSpan.innerText = currentTotal;
        for (let i = 1; i <= 8; i++) {
            const btn = document.getElementById(`card_${i}`);
            if (btn) {
                btn.querySelector('.card-count').innerText = `剩${remaining[i]}张`;
                if (remaining[i] === 0 || !gameActive || !isPlayerTurn) btn.classList.add('disabled');
                else btn.classList.remove('disabled');
            }
        }
    }
    function endGame(winner, loser, lastNum) {
        gameActive = false;
        gameStarted = false;
        if (aiTimer) clearTimeout(aiTimer);
        let resultText = winner === "player" ? '胜利' : '失败';
        msgDiv.innerHTML = winner === "player" ? `🎉 AI出${lastNum}后总分${currentTotal}超过39！你赢了！` : `💀 你出${lastNum}后总分${currentTotal}超过39，你输了！`;
        turnIndicator.innerHTML = winner === "player" ? "🏆 胜利" : "💀 失败";
        saveCurrentGameToHistory(resultText, currentTotal);
        clearCurrentMoves();
        updateUI();
    }
    function playCard(number, isPlayer) {
        if (!gameActive || !gameStarted) return false;
        if (isPlayer && !isPlayerTurn) { msgDiv.innerHTML = "现在是AI回合，请等待~"; return false; }
        if (!isPlayer && isPlayerTurn) return false;
        if (remaining[number] <= 0) { if (isPlayer) msgDiv.innerHTML = `数字${number}已经没有牌了！`; return false; }
        
        remaining[number]--;
        const newTotal = currentTotal + number;
        const who = isPlayer ? "玩家" : "AI";
        lastDrawInfo.innerHTML = `📌 ${who} 出了 ${number} (剩余${remaining[number]}张)`;
        addMove(number, who);
        
        if (newTotal > 39) { currentTotal = newTotal; updateUI(); if (isPlayer) endGame("ai", "player", number); else endGame("player", "ai", number); return true; }
        
        currentTotal = newTotal;
        updateUI();
        isPlayerTurn = !isPlayerTurn;
        
        if (gameActive) {
            if (isPlayerTurn) { turnIndicator.innerHTML = "👤 玩家回合"; msgDiv.innerHTML = `✅ ${who}出了${number}，总分${currentTotal}`; }
            else { turnIndicator.innerHTML = "🤖 AI 回合"; msgDiv.innerHTML = `✅ ${who}出了${number}，总分${currentTotal}`;
                if (aiTimer) clearTimeout(aiTimer);
                aiTimer = setTimeout(() => { if (gameActive && !isPlayerTurn && gameStarted) aiPlayCard(); }, 400);
            }
        }
        updateUI();
        return true;
    }
    function aiPlayCard() {
        if (!gameActive || isPlayerTurn || !gameStarted) return;
        const remainingCards = [];
        for (let i = 1; i <= 8; i++) if (remaining[i] > 0) remainingCards.push(i);
        if (remainingCards.length === 0) { msgDiv.innerHTML = "牌堆已空！平局！"; gameActive = false; turnIndicator.innerHTML = "🤝 平局"; updateUI(); return; }
        const bestChoice = getAIPlayCard(remainingCards, currentTotal, 0, []);
        if (bestChoice !== null) playCard(bestChoice, false);
    }
    function playerPlayCard(number) {
        if (!gameActive || !gameStarted) return;
        if (!isPlayerTurn) { msgDiv.innerHTML = "现在是AI回合，请等待~"; return; }
        if (remaining[number] <= 0) { msgDiv.innerHTML = `数字${number}已经没牌了！`; return; }
        playCard(number, true);
    }
    function initGame() {
        remaining = {1:4, 2:4, 3:4, 4:4, 5:4, 6:4, 7:4, 8:4};
        currentTotal = 0;
        gameActive = true;
        gameStarted = true;
        if (aiTimer) clearTimeout(aiTimer);
        clearCurrentMoves();
        updateUI();
        
        // 根据先手选择设置回合
        const firstHand = firstHandSelect.value;
        isPlayerTurn = (firstHand === 'player');
        
        if (isPlayerTurn) {
            turnIndicator.innerHTML = "👤 玩家回合";
            msgDiv.innerHTML = "游戏开始！玩家先出牌";
            lastDrawInfo.innerHTML = "✨ 玩家先出牌 ✨";
        } else {
            turnIndicator.innerHTML = "🤖 AI 回合";
            msgDiv.innerHTML = "游戏开始！AI先出牌";
            lastDrawInfo.innerHTML = "✨ AI先出牌 ✨";
            // AI 先手，自动出牌
            if (aiTimer) clearTimeout(aiTimer);
            aiTimer = setTimeout(() => { if (gameActive && !isPlayerTurn && gameStarted) aiPlayCard(); }, 500);
        }
        createCardButtons();
    }
    function createCardButtons() {
        cardButtonsDiv.innerHTML = '';
        for (let i = 1; i <= 8; i++) {
            const btn = document.createElement('div');
            btn.className = 'card-btn';
            btn.id = `card_${i}`;
            btn.innerHTML = `<span style="font-size:1.4rem;">${i}</span><span class="card-count">剩${remaining[i]}张</span>`;
            btn.onclick = (function(num) { return function() { playerPlayCard(num); }; })(i);
            cardButtonsDiv.appendChild(btn);
        }
        updateUI();
    }
    
    resetBtn.addEventListener('click', () => { if (aiTimer) clearTimeout(aiTimer); initGame(); });
    menuBtn.addEventListener('click', () => sideMenu.classList.add('open'));
    closeMenuBtn.addEventListener('click', () => sideMenu.classList.remove('open'));
    settingsBtn.addEventListener('click', () => settingsModal.style.display = 'flex');
    closeSettingsBtn.addEventListener('click', () => {
        musicEnabled = musicToggleSelect.value === 'on';
        if (musicEnabled && !musicStarted) playCurrentMusic();
        else if (!musicEnabled) stopMusic();
        const vol = parseInt(volumeSlider.value);
        setMusicVolume(vol);
        volumeValue.innerText = vol + '%';
        currentDifficulty = difficultySelect.value;
        settingsModal.style.display = 'none';
        if (!gameStarted) initGame();
        else { gameActive = false; initGame(); }
    });
    volumeSlider.addEventListener('input', (e) => { const val = e.target.value; volumeValue.innerText = val + '%'; setMusicVolume(parseInt(val)); });
    nextMusicBtn.addEventListener('click', nextMusic);
    
    document.body.addEventListener('click', () => { if (musicEnabled && !musicStarted) playCurrentMusic(); });
    document.body.addEventListener('touchstart', () => { if (musicEnabled && !musicStarted) playCurrentMusic(); });
    
    loadHistory();
    initGame();
    
    const GITHUB_USERNAME = "cookicGJH";
    const CURRENT_VERSION = "2.0.0";
    document.getElementById('versionInfo').innerHTML = `当前版本 v${CURRENT_VERSION}`;
</script>
</body>
    </html>
